repos:
  # ── Hooks genéricos ───────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-yaml
      # - id: no-commit-to-branch
      #   args: [--branch, main]

  # ── Prettier ─────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'cd frontend && ./node_modules/.bin/prettier --write .'
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, css, json, markdown, yaml]
        pass_filenames: false

  # ── ESLint ───────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && ./node_modules/.bin/eslint --fix .'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Commitlint ───────────────────────────────────────────────────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        name: commitlint
        stages: [commit-msg]
        args: [--config, frontend/commitlint.config.js]
        additional_dependencies:
          - "@commitlint/config-conventional@19.2.2"
